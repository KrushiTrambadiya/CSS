<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .row{
            display: grid;
            grid-row: 100px;
            background-color: hwb(272 5% 65%);
            color: aliceblue;
            align-items: center;
            height: 20px;
            padding: 10px;
            text-align: center;
            font-size: 20px;
            
        }
        .row1{
            display: grid;
            grid-row: 100px;
            background-color: rgb(94, 24, 155);
            color: aliceblue;
            align-items: center;
            height: 20px;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            
        }
        .img{
           margin: 0;
           padding: 0;
           padding: 2px;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="row">There's a newer version of Bootstrap!</div>
     <div class="row1">
        <div class="img">
            <img src="bootstrap.png" alt="bootstrap" height="40" width="40">
</body>
</html>
